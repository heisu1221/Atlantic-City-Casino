<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Registrarse - Atlantic City</title>
  <link rel="stylesheet" href="estilos.css">
</head>
<body>

<nav class="navbar">
  <div class="logo">
    <button class="logo-btn" onclick="window.location.href='index.html'">
      <h2>Atlantic City</h2>
    </button>
  </div>
  <div class="nav-btns">
    <a href="registro.html" class="btn-nav-register">Registrarse</a>
    <a href="login.html"    class="btn-nav-login">Iniciar Sesión</a>
  </div>
</nav>

<section class="hero">
  <div class="hero-overlay" style="position:fixed;inset:0;z-index:-1;background:linear-gradient(rgba(0,0,0,0.82),rgba(0,0,0,0.92));"></div>
  <div class="card" style="width:520px;max-width:95vw;">
    <h2 style="text-align:center;margin-bottom:6px;">Crear Cuenta</h2>
    <p style="text-align:center;font-size:13px;color:var(--text-muted);margin-bottom:24px;">Completa el formulario para registrarte</p>

    <form id="registroForm">
      <div class="row">
        <div class="input-group">
          <label>DNI <span style="color:var(--gold)">*</span></label>
          <input type="text" id="dni" placeholder="12345678 (8 dígitos)">
        </div>
        <div class="input-group">
          <label>Nombre completo <span style="color:var(--gold)">*</span></label>
          <input type="text" id="nombre" placeholder="Mínimo 3 letras">
        </div>
      </div>
      <div class="row">
        <div class="input-group">
          <label>Edad <span style="color:var(--gold)">*</span></label>
          <input type="number" id="edad" placeholder="Mínimo 18 años">
        </div>
        <div class="input-group">
          <label>Teléfono</label>
          <input type="text" id="telefono" placeholder="987654321 (9 dígitos)">
        </div>
      </div>
      <div class="input-group">
        <label>Correo electrónico <span style="color:var(--gold)">*</span></label>
        <input type="email" id="correo" placeholder="correo@ejemplo.com">
      </div>
      <div class="input-group">
        <label>Contraseña <span style="color:var(--gold)">*</span></label>
        <input type="password" id="contrasena" placeholder="Mínimo 6 caracteres">
      </div>

      <div id="regError" style="display:none;color:#e05555;font-size:13px;margin-bottom:10px;"></div>
      <div id="regOk"    style="display:none;color:#4caf50;font-size:13px;margin-bottom:10px;text-align:center;"></div>

      <button type="submit" class="btn-primary" style="width:100%;padding:12px;font-size:14px;margin-top:6px;">Registrarse</button>
    </form>

    <p style="text-align:center;font-size:13px;color:var(--text-muted);margin-top:18px;">
      ¿Ya tienes cuenta? <a href="login.html" style="color:var(--gold);text-decoration:none;">Inicia sesión aquí</a>
    </p>
  </div>
</section>

<script src="script.js"></script>
</body>
</html>
